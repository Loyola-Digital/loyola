status_reason: |
  8/8 ACs atendidos. Backend espelha fielmente as regras Único/Total da 18.51a
  por ad_id (retry-guard tx+produto, dedup por email/mais recente, order bump via
  orderBumpProducts) em helper puro com 7/7 testes verdes. Frontend troca colunas,
  CPL e ROAS condicionados a stageType === "paid"; calculator data-driven protege
  sales/cpl. tsc --noEmit API+Web verdes. Concern único (REG-001) é a redistribuição
  de revenue por criativo no modo sale_content — documentada como R2, baixo impacto
  e arguably corretiva (remove double-count de retry).
reviewer: 'Quinn'
updated: '2026-07-16T00:00:00Z'
top_issues:
  - id: 'REG-001'
    severity: low
    finding: |
      revenueByAdId no modo sale_content passou a vir de
      computeCreativeSalesMetrics.revenueTotalByAdId (linha-a-linha, retry-guard
      tx+produto) em vez do saleDedup por txId com last-write do ad. Consequência:
      em etapas NÃO-pagas que também usam sale_content (ex.: "sales"), o Faturamento
      e o ROAS por criativo podem se deslocar levemente — recompra fica no co= da
      própria compra (não mais no último ad) e retries reais deixam de dobrar valor.
      AC8 declara "byte-a-byte" para sales/cpl, mas o valor de revenue por criativo
      dessas etapas tecnicamente muda. Total do stage praticamente inalterado (só
      double-counts de gateway removidos). Documentado como R2 na story e aceito.
    suggested_action: |
      Spot-check pós-deploy da aba de uma etapa "sales" (sale_content, não-paga):
      confirmar que o Faturamento total do stage não moveu de forma inesperada.
      Se mover, é remoção de double-count (melhoria) ou redistribuição entre
      criativos — ambos esperados. Sem ação de código necessária.
  - id: 'TEST-001'
    severity: low
    finding: |
      A lógica de troca de colunas / CPL por Ing. Únicos / ROAS por Fat. Total no
      frontend (calculator, compile, tabela) não tem teste automatizado: vitest não
      está instalado no monorepo e o teste existente stage-creative-performance-table.test.tsx
      (stageType "awareness") não é executável. O novo helper de backend tem
      cobertura sólida (7 testes node --test), mas o caminho paid do frontend é
      verificado só estaticamente (typecheck) e manualmente.
    suggested_action: |
      Quando vitest/jest for configurado no packages/web, cobrir: PAID_COLUMNS
      renderizadas quando stageType="paid", CPL = spend÷ingressosUnicos, ROAS =
      revenueTotal÷spend, e AC8 (awareness/free/sales inalterados). Débito de infra
      herdado do projeto.
