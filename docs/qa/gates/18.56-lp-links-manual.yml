status_reason: |
  6/6 ACs atendidos. Coluna lp_links (JSONB) additive+idempotente já em prod;
  PUT valida URL em dupla camada (frontend isValidLpUrl + Zod .url()+regex
  ^https?://) — 27/27 asserts de validação verdes, bloqueando javascript:/data:/
  vbscript:/ftp:/protocol-relative. Guest bloqueado (403 antes da validação),
  anchor com rel="noopener noreferrer", partial update preserva demais campos,
  merge por chave + descarte de vazios no handler. Zero chamada à Meta API
  (sync só dispara em body.campaigns). tsc --noEmit API+web verdes. Concerns
  são low e não-bloqueantes (PERF-001 fetch extra cacheado; TEST-001 débito
  de infra herdado — sem vitest no monorepo).
reviewer: 'Quinn'
updated: '2026-07-16T00:00:00Z'
top_issues:
  - id: 'PERF-001'
    severity: low
    finding: |
      LpPerformanceSection adiciona useFunnelStage (GET single stage, queryKey
      ["funnel-stage", projectId, funnelId, stageId]) por seção só para ler
      lpLinks. Esse fetch NÃO é deduplicado contra o cache plural
      (["funnel-stages",...]) que o dashboard já carrega — é uma request de
      rede separada por seção de LP renderizada. Impacto baixo: staleTime 2min,
      payload de 1 linha, só dispara quando a seção monta.
    suggested_action: |
      Opcional: derivar lpLinks do cache de useFunnelStages (plural) já
      carregado no dashboard, ou pré-popular o cache singular via
      setQueryData, para eliminar a request extra. Sem urgência.
  - id: 'TEST-001'
    severity: low
    finding: |
      Sem teste automatizado para a validação de URL, o merge por chave, o
      render condicional do nome (hiperlink vs texto puro) e o "vazio remove".
      vitest/jest não está instalado no packages/web (débito de infra herdado,
      mesmo TEST-001 da 18.55). Validação verificada estaticamente (tsc) e via
      script node avulso (27/27 asserts) nesta review.
    suggested_action: |
      Quando vitest for configurado, cobrir: isValidLpUrl (aceita http(s),
      rejeita javascript:/data:/schemeless), LpNameCell (hiperlink quando há
      url, texto puro quando não, pencil só com onSave), e o merge por chave
      normalizada no handleSaveLpLink.
