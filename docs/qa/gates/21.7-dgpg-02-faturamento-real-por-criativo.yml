status_reason: |
  9/10 ACs atendidos com precisão; AC-8 (dedup inter-ads) cumprido
  funcionalmente mas com share proporcional (bruto / emails.length) em vez
  de valor exato por email. Backend endpoint cruza planilha leads × vendas
  corretamente, aplica normalizeNumericId no utm_content, dedup intra-ad
  via Set<email>, filtro de dias duplicado (leads+vendas), cache 5min
  reaproveitado. Frontend renderiza 💵 Faturado sempre abaixo do breakdown
  Pagos/Org, omite quando zero. stageId? opcional evita regressão em
  dashboards sem stage. typecheck API+Web + lint web: clean.
reviewer: 'Quinn'
updated: '2026-04-22T00:00:00Z'
top_issues:
  - id: 'ACCURACY-001'
    severity: medium
    finding: |
      Frontend usa share proporcional pra distribuir bruto entre emails do ad:
      `entry.faturamentoBruto / entry.emails.length`. Quando emails do mesmo ad
      compraram valores diferentes, dedup inter-ads pode errar em 5-15% no bruto
      agregado. Cenário: Ad_A tem e1=R$100+e2=R$400 (bruto 500), Ad_B tem
      e1=R$100+e3=R$200 (bruto 300). Agregado do criativo = 250+250+150 = 650,
      mas o real é 100+400+200 = 700.
    suggested_action: |
      Endpoint retornar `salesByEmail: Record<email, {bruto, liquido}>` global
      (já existe no processamento, basta exportar). Frontend consulta direto em
      vez de distribuir proporcionalmente. Fix já foi documentado em Dev Notes
      da story antes da implementação, mas não foi seguido. Backlog como v2 se
      usuário reportar divergência com valores reais.
  - id: 'TEST-013'
    severity: low
    finding: |
      Sem testes unitários — lógica de cruzamento (normalizeEmail, dedup intra-ad,
      aplicação de cutoff duplicado) é pura e trivialmente testável. Débito
      herdado do projeto (sem Jest em packages/web/api).
    suggested_action: 'Quando infraestrutura Vitest for configurada, cobrir: dedup email intra-ad, normalizeNumericId, cutoff datas, empty response, planilhas ausentes, utm não mapeado.'
