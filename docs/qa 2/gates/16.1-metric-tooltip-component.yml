    severity: low
    finding: 'Array index used as React key in formula-chart-tooltip.tsx:77 and :106 (.map with key={i}).'
    suggested_action: 'Acceptable here because Recharts payload order is stable per render. If payload reorders in future variations, switch to stable id (dataKey or seriesName).'
  - id: 'MNT-002'
    severity: low
    finding: 'Cast `value as string | number` at formula-chart-tooltip.tsx:108 — Recharts types entry.value as `any`, so cast is functionally safe but TS-wise loose.'
    suggested_action: 'Optional: narrow with explicit typeof guard before passing to <FormulaTooltipContent>.'
  - id: 'DOC-001'
    severity: low
    finding: 'aria-describedby not explicitly set — relies on Radix Tooltip primitive internal wiring, which is correct but not obvious to reviewers.'
    suggested_action: 'Radix auto-wires aria-describedby via Trigger/Content pair. No action required; documented for future auditors.'
