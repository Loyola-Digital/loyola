      o filtro "Pago" aparecerá vazio. Comportamento esperado mas pode
      confundir o user se ele esperava ver dados em "Pago" numa planilha
      sem esse mapeamento.
    suggested_action: 'Opcional: adicionar fallback via leadMatch.utmSource quando coluna ausente na survey, OU mostrar empty state explícito no filtro Pago indicando "planilha não tem utm_source mapeado". Backlog.'
