# =============================================================================
# BUSINESS FRAMEWORKS
# =============================================================================

business_models:

  model_1_lab_before_franchise:
    name: "Laboratório Próprio Antes de Franquear"
    definition: "Nunca franqueie algo que você não testou com loja própria"
    process:
      - "Abre loja própria, erra, corrige"
      - "Testa em praças diferentes (Brooklyn, Moca, São Bernardo)"
      - "Cada praça corrige mais % (40% → 60% → 80%)"
      - "Só franqueia quando modelo está 80%+ validado"
    evidence: "Ficou 1 mês de chapeiro no Brooklyn. 1 ano sem visitar pra validar que roda sozinha."
    anti_pattern: "Franqueadora de PowerPoint — 'aumenta o número de náufragos'"
    quote: "Não comprem franquia de ninguém que não rodou modelo próprio"

  model_2_ecosystem_vertical:
    name: "Ecossistema de Siglas (Verticalização)"
    definition: "Cada empresa resolve um problema e alimenta as outras"
    structure:
      BBA: "Açougue — origem, atendimento consultivo"
      BBB: "Burgers — absorve cortes não-churrasco, escala"
      BBP: "Parrilla — experiência, laboratório gastronômico"
      BBC: "Churrasco — praças de alimentação"
      BBD: "Digital — conteúdo, palestras, marketing"
      BBE: "Educação — gestão e técnica de churrasco"
    key_insight: "10 hamburguerias sustentam 1 açougue (absorvem cortes menos nobres)"

  model_3_quality_tiers:
    name: "Prateleiras de Qualidade (Não Commodity)"
    definition: "O melhor produto dentro de cada bolso e cada necessidade"
    tiers:
      espetinho: "Festa, galera da faculdade, encher a cara"
      grill: "Dia a dia, empresa, 300 colaboradores"
      premium: "Ancho, Picanha, final de semana, sogro"
      ultra_premium: "Wagyu A5 Japão, negócio fechado, impressionar"
    principle: "Não existe produto bom e barato. Existe o melhor pra cada bolso."
    quote: "Quando você pense churrasco, você vá no Netao"

  model_4_client_as_asset:
    name: "Cliente é o Maior Patrimônio"
    definition: "Tudo começa pelo ponto de vista do cliente, não pelo lucro"
    process:
      - "Meu cliente vai gostar? (primeiro filtro)"
      - "Qual a experiência dele recebendo meu produto?"
      - "Embalagem com alumínio interno pro delivery não chegar frio"
      - "Custo-benefício ajustado ao que entrega"
    evidence: "5M seguidores = base de clientes ocultos. Reclamação no Instagram = ouvidoria."
    quote: "O maior bem de uma empresa é o cliente"

  model_5_consultive_selling:
    name: "Venda Consultiva no Balcão"
    definition: "Entender o contexto antes de vender"
    process:
      - "'Churrasco pra quem?'"
      - "Entende o perfil (amigos, família, negócios, sogro)"
      - "Recomenda a prateleira certa"
      - "Upgrade natural: 'Leva um chimichurri? Uma picanha wagyu pro sogro?'"
    evidence: "R$4.500 numa venda pra cliente desconhecido. R$2.000 ao vivo na frente de franqueados."
    quote: "O cara vai no açougue porque quer a satisfação de ir lá"

  model_6_uti_team:
    name: "Equipe UTI / Emergência"
    definition: "Time que viaja até loja com problema e não sai até resolver"
    trigger: "Reclamação de seguidor, queda de performance, franqueado em dificuldade"
    evidence: "5M seguidores = maior base de clientes ocultos gratuita do mundo"

  model_7_point_rule:
    name: "Ponto = 50% do Sucesso ou 100% do Fracasso"
    definition: "Ponto ruim mata qualquer negócio. Ponto bom é meio caminho."
    examples:
      - "McDonald's vs BK Guarulhos: contorno mudou tudo"
      - "Franqueado que comprou verso de loja (frente pro muro vs frente pro mar)"
      - "Frango Assado: bolsão de acesso foi marco de virada"
    quote: "Não tem comunicação, treinamento ou gestão que supere um ponto muito ruim"

  model_8_profile_per_model:
    name: "Perfil Diferente por Modelo de Franquia"
    definition: "Cada negócio exige um tipo de franqueado"
    profiles:
      acougue:
        who: "Casal querendo vencer na vida"
        presence: "Todo dia, barriga no balcão"
        max_units: 2
        profitability: "10-15%"
        revenue: "Alto mas margem menor"
      hamburgueria:
        who: "Gestor/investidor"
        presence: "1x por semana"
        max_units: "Ilimitado (expansão agressiva permitida)"
        profitability: "15-22%"
        key_skill: "DRE, CMV, planilhas"
    quote: "Se você não quer ir todo dia, não pensa em ter açougue"

# =============================================================================
# CHURRASCO FRAMEWORKS
# =============================================================================

churrasco_models:

  model_1_temperature_test:
    name: "Teste dos 4-5 Segundos"
    definition: "Mão perto da grelha — se aguenta 4-5s, temperatura perfeita"
    quote: "Escuta o cheiro"

  model_2_maillard:
    name: "Reação de Maillard (Não Vira Antes)"
    definition: "Se a carne está grudada na grelha, ainda não dourou. Quando soltar, vira."
    technique: "Pode 'diamantar' (girar pra fazer marcas em xadrez)"
    anti_pattern: "Nunca apertar a carne — perde líquido, fica seca"

  model_3_rest:
    name: "Descanso Obrigatório (1 minuto)"
    definition: "Carne descansa 1 min fora da grelha antes de cortar"
    science: "Mioglobina (não é sangue) redistribui pelas fibras = suculência"
    quote: "Se cortar direto, vai tudo pra tábua e o meio fica cinza"

  model_4_salt_after:
    name: "Sal Depois da Maillard"
    definition: "Sal antes atrapalha dourar. Sal depois = crosta + sabor"
    evidence: "Blind tests — maioria prefere temperado depois"
    product: "Sal de parrilla com pimenta (granulometria específica, não separa)"

  model_5_cut_against_fiber:
    name: "Corte Contra as Fibras"
    definition: "Cortar perpendicular às fibras rompe-as = mais maciez na mastigação"
    exception: "Carnes em colmeia (como flat iron) — pode cortar de qualquer lado"

  model_6_gas_vs_charcoal:
    name: "Carvão é Evento, Gás é Situação"
    definition: "Carvão = sabor máximo, eventos. Gás/elétrica = dia-a-dia, praticidade."
    evidence: "Faz churrasco pra filha às 23h na Dinox a gás. 'Me nego a fritar na panela.'"

  model_7_halal_quality:
    name: "Protocolo Halal = Qualidade Superior"
    definition: "Animal descansado pré-abate recupera glicogênio = pH < 5.7 = carne macia"
    science: "Glicogênio consumido no estresse → pH alto → carne dura"
    quote: "Independente de religião, a carne halal tem qualidade superior"

# =============================================================================
# LEADERSHIP FRAMEWORKS
# =============================================================================

leadership_models:

  model_1_leadership_trinity:
    name: "Engajar + Cobrar + Agradecer"
    definition: "Três ações obrigatórias do líder"
    detail:
      engajar: "Perspectiva de carreira, bom ambiente, respeito. NÃO festinhas motivacionais."
      cobrar: "Resultado, tempo, entrega. 'Líder mais amado = primeiro demitido porque não cobra.'"
      agradecer: "Reconhecer publicamente. 'Na locomotiva que não para, a gente esquece de agradecer.'"
    quote: "Motivação é escolha, engajamento é missão"

  model_2_culture_by_contact:
    name: "Cultura pelo Contato Físico"
    definition: "Cultura se repassa corpo a corpo, não por PPT"
    process:
      - "Reuniões na casa dele (café da manhã, churrasco, problemas surgem organicamente)"
      - "Presencial cada 15 dias, virtual semanal"
      - "Líder incorpora cultura → repassa para campo"
    anti_pattern: "Home office para equipe operacional"
    quote: "O Douglas Santana vai lá e ele tá incorporado com a sua cultura"

  model_3_lead_by_example:
    name: "Exemplo Arrasta"
    definition: "Líder entra às 6h, sai às 2h da manhã, faz tudo junto"
    evidence: "Entrava 6h no açougue, fechava, ia pra hamburgueria até 2h da manhã"
    quote: "Inspiração sem transpiração não existe. Tem que transpirar junto."

# =============================================================================
# LIFE FRAMEWORKS
# =============================================================================

life_models:

  model_1_money_volume_time:
    name: "Dinheiro = Volume x Tempo"
    definition: "Não dá pra ter bilhão em 5 anos. Patrimônio é acúmulo ao longo de décadas."
    quote: "O cara tinha 35 anos e falava que tinha 3 bi. Me desculpa, não dá tempo."

  model_2_faith_genuine:
    name: "Fé Genuína vs Fé Mercantilizada"
    definition: "Crer em Deus é legit. Usar Deus pra vender é crime."
    quote: "Tu vai pro inferno sem pedágio"
    boundary: "Não usar fé para manipular, mas não esconder fé genuína"

  model_3_never_quit:
    name: "Insiste, Persiste, Nunca Desiste"
    origin: "Frase do primo, antes de comprar o açougue"
    evidence: "Dia 1: carne podre, balcão quebrado, calote R$48k. Continuou."

  model_4_continuous_error_improvement:
    name: "Erra Todo Dia, Melhora Todo Dia"
    definition: "Aceitar o erro como parte do processo, mas melhorar 1% cada dia"
    quote: "Vou continuar errando todo dia mas todo dia eu vou melhorar um pouquinho"

