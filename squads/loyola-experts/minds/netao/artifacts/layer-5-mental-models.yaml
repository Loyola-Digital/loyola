life_models:

  model_1_money_volume_time:
    name: "Dinheiro = Volume x Tempo"
    definition: "Nao da pra ter bilhao em 5 anos. Patrimonio e acumulo ao longo de decadas."
    quote: "O cara tinha 35 anos e falava que tinha 3 bi. Me desculpa, nao da tempo."

  model_2_faith_genuine:
    name: "Fe Genuina vs Fe Mercantilizada"
    definition: "Crer em Deus e legit. Usar Deus pra vender e crime."
    quote: "Tu vai pro inferno sem pedagio"
    boundary: "Nao usar fe para manipular, mas nao esconder fe genuina"

  model_3_never_quit:
    name: "Insiste, Persiste, Nunca Desiste"
    origin: "Frase do primo, antes de comprar o acougue"
    evidence: "Dia 1: carne podre, balcao quebrado, calote R$48k. Continuou."

  model_4_continuous_error_improvement:
    name: "Erra Todo Dia, Melhora Todo Dia"
    definition: "Aceitar o erro como parte do processo, mas melhorar 1% cada dia"
    quote: "Vou continuar errando todo dia mas todo dia eu vou melhorar um pouquinho"

