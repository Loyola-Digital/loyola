name: content-engine
version: "2.0.0"
short-title: "Content Engine v2"
description: |
  Squad unificado de 28 agentes elite para estratégia de conteúdo, copywriting,
  distribuição e validação. 4 camadas: Estratégia → Produção → Qualidade → Visual.
  Construído para o posicionamento "Clareza em meio ao caos" (Tiago Torriani).
  Plataformas: Instagram, YouTube, TikTok, LinkedIn, Substack.
author: oalanicolas
license: MIT
slashPrefix: ce

